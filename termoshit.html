<script type="text/javascript">
  const firstParts = [
    "judéo",
    "catho",
    "christiano",
    "musulmano",
    "islamo",
    "brahmano",
    "orthodoxo",
    "protesto",
    "sunno",
    "chiismo",
    "bouddhano",
    "hindo",
    "confuciano",
    "jaïno",
    "shinto",
    "sikho",
    "tao",
    "zoroastrio",
    "caodaïo",
  ];

  const secondParts = [
    "anarchisme",
    "bolchévisme",
    "marxisme",
    "écologisme",
    "gauchisme",
    "droitisme",
    "libéralisme",
    "communisme",
    "socialisme",
    "capitalisme",
    "féminisme",
    "facisme",
    "nazisme",
    "réformisme",
    "corporatisme",
    "distributisme",
    "institutionnalisme",
    "néoclassicisme",
    "mercantilisme",
  ];

  function getNewTerm() {
    const firstTerm = firstParts[Math.trunc(Math.random() * firstParts.length)];
    const secondTerm =
      secondParts[Math.trunc(Math.random() * secondParts.length)];

    return `${firstTerm}${secondTerm}`;
  }

  function shit() {
    const termContainer = document.getElementById("term-container");

    termContainer.textContent = getNewTerm();
  }

  shit();
</script>
